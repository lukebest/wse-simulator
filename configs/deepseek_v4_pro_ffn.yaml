wafer:
  reticle_rows: 6
  reticle_cols: 8
  reticle_dead_positions:
    - [3, 0]
    - [4, 0]
  reticle_io_positions:
    - [1, 0]
    - [2, 0]
  io_bandwidth_gbps: 256.0
compute:
  pe_type: cube
  pe_freq_ghz: 2.0
  l1_capacity_kb: 2048
  cube_m_tile: 4
  cube_k_tile: 32
  cube_n_tile: 16
  cube_startup_cycles: 27
  cube_steady_cycles: 5
memory:
  per_core_bandwidth_gbps: 256.0
  per_core_latency_ns: 100.0
network:
  io_distribution_policy: round_robin
  noc:
    freq_ghz: 2.2
    link_width_bytes: 128
  now:
    freq_ghz: 2.2
    link_width_bytes: 128
    link_latency_cycles: 5
workload:
  model_name: deepseek_v4_pro_ffn_decode
  hidden_dim: 7168
  expert_ffn_dim: 3072
  num_routed_experts: 384
  num_shared_experts: 1
  top_k: 6
  decode_tokens: 32
  routing_skew_alpha: 1.2
  capacity_factor: 1.25
  partition_strategy: expert
  partition_shards: 1
  mapping_strategy: expert_affinity
dse:
  objective: latency_min
  max_trials: 50
  score_weights:
    total_latency_cycles: -1.0
    memory_stall_cycles: -0.5
    io_injection_cycles: -0.2
    vc_wait_cycles: -0.1
    buffer_wait_cycles: -0.1
    link_wait_cycles: -0.05
    gateway_noc_hops: -0.001
    gateway_peak_load: -0.05
