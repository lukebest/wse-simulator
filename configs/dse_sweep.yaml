dse:
  objective: latency_min
  max_trials: 20
  random_seed: 1234
search_space:
  batch_size: [4, 16]
  noc_buffer_depth: [4, 8, 16]
  noc_num_vcs: [1, 2, 4]
  partition_strategy: [expert, col, k_split]
  partition_shards: [1, 2, 4, 7]
  noc_topology: [mesh2d, flat_butterfly, butterfly, supermesh_bi, supermesh_alter]
  noc_routing: [xy, ugal, table_based]
  noc_flow_control: [credit_vc, wormhole]
  now_topology: [mesh2d, flat_butterfly, butterfly]
  now_routing: [xy, ugal, table_based]
  now_flow_control: [credit_vc, wormhole]
